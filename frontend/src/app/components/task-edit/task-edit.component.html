<div class="layout-container">
  <mat-card class="page-card" *ngIf="!loading">
    <mat-card-header>
      <mat-card-title>{{ isEdit ? '编辑任务' : '新建任务' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
        <div class="form-section">
          <h3 class="form-section-title">基本信息</h3>
          
          <mat-form-field appearance="outline">
            <mat-label>选择模板</mat-label>
            <mat-select 
              formControlName="templateId" 
              required
              (selectionChange)="onTemplateChange($event.value)"
            >
              <mat-option *ngFor="let template of templates" [value]="template.id">
                {{ template.name }}
              </mat-option>
            </mat-select>
            <mat-error *ngIf="taskForm.get('templateId')?.invalid">
              请选择模板
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>任务标题</mat-label>
            <input matInput formControlName="title" required maxlength="500">
            <mat-error *ngIf="taskForm.get('title')?.invalid">
              请输入有效的任务标题
            </mat-error>
          </mat-form-field>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>任务状态</mat-label>
              <mat-select formControlName="status" required>
                <mat-option *ngFor="let status of statuses" [value]="status.value">
                  {{ status.label }}
                </mat-option>
              </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>进度 (%)</mat-label>
              <input matInput type="number" formControlName="progress" min="0" max="100">
            </mat-form-field>
          </div>

          <mat-form-field appearance="outline">
            <mat-label>截止日期</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="dueDate">
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="form-section" *ngIf="selectedTemplateId && templateFields.length > 0">
          <h3 class="form-section-title">模板字段</h3>
          
          <div *ngIf="loadingFields" class="empty-state">
            <mat-progress-spinner mode="indeterminate" diameter="30"></mat-progress-spinner>
          </div>

          <app-dynamic-form 
            *ngIf="!loadingFields"
            #dynamicForm
            [fields]="templateFields"
            [initialValues]="taskData"
          ></app-dynamic-form>
        </div>

        <div class="form-section" *ngIf="selectedTemplateId && templateFields.length === 0 && !loadingFields">
          <div class="empty-state">
            <mat-icon class="empty-state-icon">info</mat-icon>
            <p>该模板尚未定义任何自定义字段</p>
          </div>
        </div>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="submitting">
            <span *ngIf="submitting">保存中...</span>
            <span *ngIf="!submitting">{{ isEdit ? '更新' : '保存' }}</span>
          </button>
          <button mat-stroked-button type="button" (click)="cancel()">
            取消
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <div *ngIf="loading" class="empty-state">
    <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
  </div>
</div>
