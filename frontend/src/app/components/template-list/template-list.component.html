<div class="layout-container">
  <mat-card class="page-card">
    <mat-card-header>
      <mat-card-title>模板管理</mat-card-title>
      <button mat-raised-button color="primary" routerLink="/templates/new">
        <mat-icon>add</mat-icon>
        新建模板
      </button>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="loading" class="empty-state">
        <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
      </div>

      <div *ngIf="!loading && templates.length === 0" class="empty-state">
        <mat-icon class="empty-state-icon">folder_open</mat-icon>
        <p>暂无模板，请点击"新建模板"创建</p>
        <button mat-raised-button color="primary" routerLink="/templates/new">
          新建模板
        </button>
      </div>

      <mat-table [dataSource]="dataSource" *ngIf="!loading && templates.length > 0">
        <ng-container matColumnDef="id">
          <mat-header-cell *matHeaderCellDef> ID </mat-header-cell>
          <mat-cell *matCellDef="let element"> {{element.id}} </mat-cell>
        </ng-container>

        <ng-container matColumnDef="name">
          <mat-header-cell *matHeaderCellDef> 模板名称 </mat-header-cell>
          <mat-cell *matCellDef="let element">
            <strong>{{element.name}}</strong>
          </mat-cell>
        </ng-container>

        <ng-container matColumnDef="description">
          <mat-header-cell *matHeaderCellDef> 描述 </mat-header-cell>
          <mat-cell *matCellDef="let element"> {{element.description || '-'}} </mat-cell>
        </ng-container>

        <ng-container matColumnDef="createdAt">
          <mat-header-cell *matHeaderCellDef> 创建时间 </mat-header-cell>
          <mat-cell *matCellDef="let element"> 
            {{element.createdAt | date:'yyyy-MM-dd HH:mm'}} 
          </mat-cell>
        </ng-container>

        <ng-container matColumnDef="actions">
          <mat-header-cell *matHeaderCellDef> 操作 </mat-header-cell>
          <mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary" 
                    (click)="createTaskFromTemplate(element.id)" 
                    matTooltip="创建任务">
              <mat-icon>add_task</mat-icon>
            </button>
            <button mat-icon-button color="primary" 
                    (click)="editTemplate(element.id)" 
                    matTooltip="编辑">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" 
                    (click)="deleteTemplate(element)" 
                    matTooltip="删除">
              <mat-icon>delete</mat-icon>
            </button>
          </mat-cell>
        </ng-container>

        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
      </mat-table>
    </mat-card-content>
  </mat-card>
</div>
