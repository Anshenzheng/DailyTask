<div class="container">
  <mat-card class="card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon color="primary">library_books</mat-icon> 模板管理
      </mat-card-title>
      <button mat-raised-button color="primary" routerLink="/templates/new">
        <mat-icon>add</mat-icon> 新建模板
      </button>
    </mat-card-header>
    
    <mat-card-content>
      <div *ngIf="loading" class="loading-container">
        <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
      </div>

      <div *ngIf="!loading && templates.length === 0" class="empty-state">
        <mat-icon>inbox</mat-icon>
        <p>暂无模板，请点击"新建模板"创建</p>
      </div>

      <table mat-table [dataSource]="templates" *ngIf="!loading && templates.length > 0">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> 模板名称 </th>
          <td mat-cell *matCellDef="let element">
            <strong>{{element.name}}</strong>
          </td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef> 描述 </th>
          <td mat-cell *matCellDef="let element"> {{element.description || '-'}} </td>
        </ng-container>

        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef> 创建时间 </th>
          <td mat-cell *matCellDef="let element"> {{element.createdAt | date:'yyyy-MM-dd HH:mm'}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> 操作 </th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary" (click)="createTaskFromTemplate(element.id)" matTooltip="创建任务">
              <mat-icon>add_task</mat-icon>
            </button>
            <button mat-icon-button color="primary" (click)="editTemplate(element.id)" matTooltip="编辑">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteTemplate(element)" matTooltip="删除">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
